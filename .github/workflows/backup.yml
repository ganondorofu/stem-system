name: Daily DB Backup

on:
  schedule:
    - cron: '0 17 * * *'  # 毎日 02:00 JST (17:00 UTC)
  workflow_dispatch:        # 手動実行も可能

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y curl ca-certificates
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" \
            --format=custom \
            --no-owner \
            --no-privileges \
            -f backup.dump

      - name: Encrypt with GPG (AES256)
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PASSPHRASE" | gpg --batch --yes \
            --passphrase-fd 0 \
            --symmetric \
            --cipher-algo AES256 \
            -o backup.dump.gpg \
            backup.dump
          rm backup.dump

      - name: Push to backup repository
        env:
          BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
          BACKUP_REPO: ${{ secrets.BACKUP_REPO }}
        run: |
          FILENAME="$(date -u +%Y-%m-%dT%H-%M-%SZ).dump.gpg"
          git clone "https://x-access-token:${BACKUP_REPO_TOKEN}@github.com/${BACKUP_REPO}.git" backup-repo
          cp backup.dump.gpg "backup-repo/$FILENAME"
          cd backup-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "$FILENAME"
          git commit -m "backup: $FILENAME"
          git push

      - name: Delete backups older than 7 days
        env:
          GH_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
          BACKUP_REPO: ${{ secrets.BACKUP_REPO }}
        run: |
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT%H-%M-%SZ)
          FILES=$(gh api "repos/${BACKUP_REPO}/contents" --jq '.[].name' 2>/dev/null || true)
          for FILE in $FILES; do
            if [[ "$FILE" < "$CUTOFF" ]]; then
              SHA=$(gh api "repos/${BACKUP_REPO}/contents/${FILE}" --jq '.sha')
              gh api --method DELETE "repos/${BACKUP_REPO}/contents/${FILE}" \
                --field message="cleanup: $FILE" \
                --field sha="$SHA" || true
            fi
          done

      - name: Cleanup
        if: always()
        run: rm -f backup.dump backup.dump.gpg
